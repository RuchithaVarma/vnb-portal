<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login Test</title>
    <script>
        async function testAdminLogin() {
            console.log('Testing admin login...');
            
            try {
                // Test hardcoded admin credentials
                const response = await fetch('http://localhost:3000/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@brilliantroots.com',
                        password: 'admin123'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Login successful:', data);
                    document.getElementById('result').innerHTML = '<div style="color: green;">✅ Admin login works! Redirecting to admin page...</div>';
                    
                    // Redirect to admin page
                    setTimeout(() => {
                        window.location.href = 'http://localhost:3000/admin';
                    }, 2000);
                } else {
                    console.log('Login failed:', response.status);
                    document.getElementById('result').innerHTML = '<div style="color: red;">❌ Login failed. Try direct access.</div>';
                    
                    // Try direct access to admin page
                    setTimeout(() => {
                        window.location.href = 'http://localhost:3000/admin';
                    }, 2000);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = '<div style="color: orange;">⚠️ Error testing login. Trying direct access...</div>';
                
                // Try direct access to admin page
                setTimeout(() => {
                    window.location.href = 'http://localhost:3000/admin';
                }, 2000);
            }
        }
        
        // Auto-run test
        window.onload = testAdminLogin;
    </script>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto;">
    <h1>Admin Login Test</h1>
    <p>Testing admin login functionality...</p>
    <div id="result">Loading...</div>
    
    <div style="margin-top: 20px;">
        <h3>Manual Test Options:</h3>
        <ul>
            <li><a href="http://localhost:3000/admin" target="_blank">Open Admin Page Directly</a></li>
            <li><a href="http://localhost:3000/admin/courses" target="_blank">Open Admin Courses Page</a></li>
        </ul>
        
        <h3>Admin Credentials:</h3>
        <p><strong>Email:</strong> admin@brilliantroots.com</p>
        <p><strong>Password:</strong> admin123</p>
    </div>
</body>
</html>
