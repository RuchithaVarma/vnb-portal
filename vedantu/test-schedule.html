<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        const { Calendar, Clock, Video, Users, Plus, Search, Filter, ChevronLeft, ChevronRight, PlayCircle, Edit, Trash2, Eye, Bell, CheckCircle, XCircle, AlertCircle, User, BookOpen, MapPin, Phone, Mail, MoreVertical } = lucide;
        
        function ScheduleManagement() {
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [viewMode, setViewMode] = useState('week');
            const [searchTerm, setSearchTerm] = useState('');
            
            const timeSlots = [
                '09:00 AM', '10:00 AM', '11:00 AM', '12:00 PM',
                '01:00 PM', '02:00 PM', '03:00 PM', '04:00 PM',
                '05:00 PM', '06:00 PM', '07:00 PM', '08:00 PM'
            ];
            
            const classes = [
                {
                    id: 1,
                    title: 'Mathematics - Calculus Basics',
                    teacher: 'Dr. Rajesh Kumar',
                    students: 45,
                    time: '10:00 AM',
                    duration: '60 min',
                    date: '2024-03-16',
                    status: 'scheduled',
                    type: 'live',
                    platform: 'Zoom',
                    link: 'https://zoom.us/j/123456789',
                    reminder: true
                },
                {
                    id: 2,
                    title: 'Physics - Quantum Mechanics',
                    teacher: 'Prof. Sarah Williams',
                    students: 32,
                    time: '02:00 PM',
                    duration: '90 min',
                    date: '2024-03-16',
                    status: 'live',
                    type: 'live',
                    platform: 'Google Meet',
                    link: 'https://meet.google.com/abc-defg-hij',
                    reminder: true
                }
            ];
            
            const getStatusColor = (status) => {
                switch(status) {
                    case 'scheduled': return 'bg-blue-100 text-blue-800';
                    case 'live': return 'bg-green-100 text-green-800';
                    case 'completed': return 'bg-gray-100 text-gray-800';
                    case 'cancelled': return 'bg-red-100 text-red-800';
                    default: return 'bg-gray-100 text-gray-800';
                }
            };
            
            const renderListView = () => (
                <div className="space-y-4">
                    {classes.map(classItem => (
                        <div key={classItem.id} className="bg-white rounded-xl shadow-sm p-6 hover:shadow-md transition-shadow">
                            <div className="flex items-start justify-between">
                                <div className="flex-1">
                                    <div className="flex items-center mb-2">
                                        <Video className="w-4 h-4" />
                                        <h3 className="font-semibold text-lg ml-2">{classItem.title}</h3>
                                        <span className={`ml-3 px-2 py-1 rounded-full text-xs font-medium ${getStatusColor(classItem.status)}`}>
                                            {classItem.status}
                                        </span>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-sm">
                                        <div className="flex items-center text-gray-600">
                                            <User className="w-4 h-4 mr-2" />
                                            {classItem.teacher}
                                        </div>
                                        <div className="flex items-center text-gray-600">
                                            <Clock className="w-4 h-4 mr-2" />
                                            {classItem.time} ({classItem.duration})
                                        </div>
                                        <div className="flex items-center text-gray-600">
                                            <Users className="w-4 h-4 mr-2" />
                                            {classItem.students} students
                                        </div>
                                        <div className="flex items-center text-gray-600">
                                            <Video className="w-4 h-4 mr-2" />
                                            {classItem.platform}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
            
            return (
                <div className="min-h-screen bg-gray-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-2xl font-bold mb-6">Schedule Management</h1>
                        
                        <div className="bg-white rounded-xl shadow-sm p-4 mb-6">
                            <div className="flex space-x-2">
                                {['day', 'week', 'month', 'list'].map(mode => (
                                    <button
                                        key={mode}
                                        onClick={() => setViewMode(mode)}
                                        className={`px-4 py-2 rounded-lg capitalize ${
                                            viewMode === mode
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        {mode} View
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        {viewMode === 'list' && renderListView()}
                        
                        <div className="mt-6">
                            <h2 className="text-lg font-semibold mb-4">Quick Stats</h2>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div className="bg-white rounded-xl shadow-sm p-4">
                                    <p className="text-gray-500 text-sm">Total Classes</p>
                                    <p className="text-2xl font-bold mt-1">24</p>
                                </div>
                                <div className="bg-white rounded-xl shadow-sm p-4">
                                    <p className="text-gray-500 text-sm">Today's Classes</p>
                                    <p className="text-2xl font-bold mt-1">6</p>
                                </div>
                                <div className="bg-white rounded-xl shadow-sm p-4">
                                    <p className="text-gray-500 text-sm">Live Now</p>
                                    <p className="text-2xl font-bold mt-1">2</p>
                                </div>
                                <div className="bg-white rounded-xl shadow-sm p-4">
                                    <p className="text-gray-500 text-sm">Pending</p>
                                    <p className="text-2xl font-bold mt-1">5</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<ScheduleManagement />, document.getElementById('root'));
    </script>
</body>
</html>
