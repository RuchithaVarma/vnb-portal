[build]
  base = "vedantu/"
  command = "chmod +x build.sh && ./build.sh"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline --no-audit"

# Cache dependencies for faster builds
[[build.cache]]
  path = "node_modules"
  name = "node_modules"

[[build.cache]]
  path = ".next/cache"
  name = "next_cache"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
