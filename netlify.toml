[build]
  base = "vedantu/"
  command = "npm ci && npm run build"
  publish = "out"
  NPM_FLAGS = "--prefer-offline --no-audit"

[build.environment]
  NODE_VERSION = "20"

# Cache dependencies for faster builds
[[build.cache]]
  path = "vedantu/node_modules"
  name = "node_modules"

[[build.cache]]
  path = "vedantu/.next/cache"
  name = "next_cache"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
